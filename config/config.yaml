artifacts_root: artifacts 


data_ingestion:
  root_dir: artifacts/data_ingestion
  source_url: https://drive.google.com/uc?export=download&id=1UwPJd0mi4gZ5F84u2rLYf6DtivKla10j
  local_data_file: artifacts/data_ingestion/data.zip
  unzip_dir: artifacts/data_ingestion

data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt
  unzip_data_dir: artifacts/data_ingestion/household_power_consumption.txt

data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/household_power_consumption.txt
  transformed_train_file_path: artifacts/data_transformation/train_transformed.csv
  transformed_test_file_path: artifacts/data_transformation/test_transformed.csv
  preprocessor_obj_file_path: artifacts/data_transformation/preprocessor.pkl
  date_col: Date
  time_col: Time

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/train_transformed.csv
  test_data_path: artifacts/data_transformation/test_transformed.csv

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/test_transformed.csv
  model_path: artifacts/model_trainer/model.h5
  preprocessor_path: artifacts/data_transformation/preprocessor.pkl
  metric_file_name: artifacts/model_evaluation/metrics.json
  mlflow_uri: "https://dagshub.com/MainakDanOpRes/dlops_energy_forecasting_with_MLflow.mlflow"