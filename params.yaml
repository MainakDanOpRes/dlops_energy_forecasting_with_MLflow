# Data Transformation Parameters
data_transformation:
  window_size: 24

# Hyperparameter tuning control
tuning:
  tuner_type: "randomsearch"
  objective: "val_loss"
  max_trials: 10
  executions_per_trial: 1
  tuner_epochs: 15
  final_epochs: 40
  hyperband_max_epochs: 30
  patience: 3
  seed: 42

# Deep Learning Model Parameters
LSTM:
  units_layer_1: 
    min: 32
    max: 128
    step: 32
  units_layer_2: 
    min: 16
    max: 64
    step: 16
  dropout_rate:
    min: 0.1
    max: 0.4
    step: 0.1
  dense_units:
    min: 8
    max: 32
    step: 8
  learning_rate:
    values: [0.01, 0.001, 0.0005, 0.0001]
  batch_size:
    values: [16, 32, 64]
  optimizer: "adam"
  loss: "mse"

GRU:
  units_layer_1:
    min: 32
    max: 128
    step: 32
  units_layer_2:
    min: 16
    max: 64
    step: 16
  dropout_rate:
    min: 0.1
    max: 0.4
    step: 0.1
  dense_units:
    min: 8
    max: 32
    step: 8
  learning_rate:
    values: [0.01, 0.001, 0.0005, 0.0001]
  batch_size:
    values: [16, 32, 64]
  optimizer: "adam"
  loss: "mse"